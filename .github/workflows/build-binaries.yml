name: Build Executables

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --name subsonic-player main.py

      - name: Package artifact (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          zip -j release/subsonic-player-${{ matrix.os }}.zip dist/subsonic-player

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist\subsonic-player.exe -DestinationPath release\subsonic-player-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subsonic-player-${{ matrix.os }}
          path: release/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Create GitHub Release with assets
        uses: ncipollo/release-action@v1
        with:
          tag: release-${{ github.run_number }}
          name: "Subsonic Player Build #${{ github.run_number }}"
          body: |
            Automated Subsonic Player release for `${{ github.ref }}`.
            Build run: ${{ github.run_id }}
          artifacts: |
            subsonic-player-ubuntu-latest
            subsonic-player-macos-latest
            subsonic-player-windows-latest
